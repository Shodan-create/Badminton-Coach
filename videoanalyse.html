<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton AI Coach - Stabile Suite</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #09090b;
            color: #f4f4f5;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        h1 {
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #a1a1aa;
            margin-bottom: 20px;
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #1e1e24;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
            width: 100%;
            max-width: 640px;
        }
        video {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .dashboard-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }
        .panel {
            background: #111115;
            border: 2px solid #1e1e24;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            flex: 1;
            min-width: 280px;
        }
        .panel-title {
            color: #ffcc00;
            font-weight: bold;
            font-size: 0.9em;
            border-bottom: 1px solid #27272a;
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .data-item {
            font-size: 0.85em;
            margin: 5px 0;
            color: #a1a1aa;
        }
        .value-highlight {
            font-size: 1.4em;
            font-weight: bold;
            color: #00ffcc;
            margin-top: 5px;
        }
        .toolbar {
            background: #111115;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            border: 1px solid #1e1e24;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }
        button, select, input[type="file"] {
            background: #1e1e24;
            color: white;
            border: 1px solid #3f3f46;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover, select:hover {
            background: #27272a;
            border-color: #00ffcc;
        }
        .mode-indicator {
            color: #ff3366;
            font-weight: bold;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ BADMINTON AI COACH</h1>
    <div class="subtitle">Video hochladen, anhalten und nacheinander Schulter, Hüfte, Knie, Fuß und Ball anklicken.</div>

    <div style="margin-bottom: 15px;">
        <input type="file" id="fileInput" accept="video/*, .mov, .mp4">
        <select id="shotTypeSelect" style="margin-left: 10px;">
            <option value="Smash">🏸 Schlagtyp: SMASH</option>
            <option value="Clear">🏸 Schlagtyp: CLEAR</option>
            <option value="Drop">🏸 Schlagtyp: DROP</option>
        </select>
    </div>

    <!-- Das alte, unkaputtbare Video-Layout -->
    <div class="video-wrapper">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Die schicken, neuen AI-Module direkt darunter -->
    <div class="dashboard-grid">
        <div class="panel">
            <div class="panel-title">📐 EP. 1&2: Coordinates</div>
            <div id="modeStatus" class="mode-indicator">Bitte klicke auf die SCHULTER</div>
            <div id="coordData"></div>
            <div class="value-highlight" id="angleData">--°</div>
        </div>

        <div class="panel">
            <div class="panel-title">🚀 EP. 5: Shuttle Speed</div>
            <div id="shuttleCoords" class="data-item">Ball-Position: Ausstehend</div>
            <div class="value-highlight" id="speedData" style="color: #ffcc00;">-- km/h</div>
        </div>

        <div class="panel" style="min-width: 100%;">
            <div class="panel-title">📊 EP. 3&4: Field Metrics</div>
            <div id="classificationReport" class="data-item">Klassifizierung: Manuell</div>
            <div id="heatMapStatus" class="data-item">Treffzone: Keine Daten</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="playBtn">▶ Play</button>
        <button id="prevFrame">◀ Frame zurück</button>
        <button id="nextFrame">Frame vor ▶</button>
        <select id="speedSelect">
            <option value="1">Normal (1x)</option>
            <option value="0.5">Slow-Mo (0.5x)</option>
            <option value="0.25" selected>Slow-Mo (0.25x)</option>
        </select>
        <button id="clearBtn" style="background: #7f1d1d; border-color: #ef4444;">❌ Zeichnung löschen</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const shotTypeSelect = document.getElementById('shotTypeSelect');
    
    const modeStatus = document.getElementById('modeStatus');
    const coordData = document.getElementById('coordData');
    const angleData = document.getElementById('angleData');
    const shuttleCoords = document.getElementById('shuttleCoords');
    const speedData = document.getElementById('speedData');
    const classificationReport = document.getElementById('classificationReport');
    const heatMapStatus = document.getElementById('heatMapStatus');

    const playBtn = document.getElementById('playBtn');
    const prevFrame = document.getElementById('prevFrame');
    const nextFrame = document.getElementById('nextFrame');
    const speedSelect = document.getElementById('speedSelect');
    const clearBtn = document.getElementById('clearBtn');

    let bodyPoints = []; 
    let shuttlePoint = null;
    const bodyLabels = ["Schulter", "Hüfte", "Knie", "Fuß"];

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; // Absicherung für Einzeldatei-Stream
        if (file) {
            video.src = URL.createObjectURL(file);
            video.load();
            resetAllMetrics();
        }
    });

    video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        video.playbackRate = parseFloat(speedSelect.value);
    });

    window.addEventListener('resize', () => {
        if(video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            redrawCanvas();
        }
    });

    playBtn.addEventListener('click', () => {
        if (video.paused) { video.play(); playBtn.innerText = "⏸ Pause"; } 
        else { video.pause(); playBtn.innerText = "▶ Play"; }
    });

    speedSelect.addEventListener('change', () => { video.playbackRate = parseFloat(speedSelect.value); });
    prevFrame.addEventListener('click', () => { video.pause(); playBtn.innerText = "▶ Play"; video.currentTime = Math.max(0, video.currentTime - 0.04); });
    nextFrame.addEventListener('click', () => { video.pause(); playBtn.innerText = "▶ Play"; video.currentTime = Math.min(video.duration, video.currentTime + 0.04); });

    canvas.addEventListener('mousedown', (e) => {
        if (!video.src) return;

        const rect = canvas.getBoundingClientRect();
        const posX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        const posY = ((e.clientY - rect.top) / rect.height) * canvas.height;

        if (bodyPoints.length < 4) {
            bodyPoints.push({ x: posX, y: posY, label: bodyLabels[bodyPoints.length] });
        } else if (!shuttlePoint) {
            shuttlePoint = { x: posX, y: posY };
        }
        
        redrawCanvas();
    });

    function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        coordData.innerHTML = "";

        if (bodyPoints.length > 0) {
            ctx.lineWidth = Math.max(5, canvas.width / 150);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.strokeStyle = "#ff3366";
            
            for (let i = 0; i < bodyPoints.length; i++) {
                if (i === 2) {
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.strokeStyle = "#00ffcc";
                    ctx.moveTo(bodyPoints[i-1].x, bodyPoints[i-1].y);
                }

                if (i === 0) ctx.moveTo(bodyPoints[i].x, bodyPoints[i].y);
                else ctx.lineTo(bodyPoints[i].x, bodyPoints[i].y);

                ctx.fillStyle = "#ffcc00";
                ctx.beginPath();
                ctx.arc(bodyPoints[i].x, bodyPoints[i].y, Math.max(6, canvas.width / 100), 0, 2 * Math.PI);
                ctx.fill();
