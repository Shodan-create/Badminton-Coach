<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Badminton Videoanalyse</title>
    
    <!-- Die absolut stabilen, klassischen MediaPipe Skripte -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .video-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            width: 100%;
            max-width: 640px;
        }
        video {
            display: block;
            width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .controls {
            margin: 20px 0;
        }
        .status {
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Badminton KI-Bewegungsanalyse</h1>
    <p>Lade dein Badminton-Video hoch. Das Skelett-Tracking startet automatisch beim Abspielen.</p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="video/*">
        <p id="status" class="status">KI-Modell wird initialisiert...</p>
    </div>

    <div class="video-container">
        <video id="video" controls playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const statusText = document.getElementById('status');

    // 1. MediaPipe Pose Instanz erstellen
    const pose = new Pose({
        locateFile: (file) => {
            return `https://jsdelivr.net{file}`;
        }
    });

    pose.setOptions({
        modelComplexity: 1, // 1 = Ausgewogen für Geschwindigkeit & Genauigkeit
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // Sobald die KI Ergebnisse liefert, zeichnen wir sie auf das Canvas
    pose.onResults((results) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.poseLandmarks) {
            // Nutzen der offiziellen Zeichenfunktion von MediaPipe
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
            drawLandmarks(ctx, results.poseLandmarks, {color: '#00ffcc', lineWidth: 2, radius: 5});
        }
    });

    // Bestätigung, dass das Skript startbereit ist
    statusText.innerText = "KI bereit! Bitte wähle ein Video aus.";
    statusText.style.color = "#00ffcc";

    // 2. Video-Upload verarbeiten
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; // Greift korrekt auf die erste ausgewählte Datei zu
        if (file) {
            const fileURL = URL.createObjectURL(file);
            video.src = fileURL;
            video.load();
            statusText.innerText = "Video geladen. Drücke auf Play zum Analysieren.";
            statusText.style.color = "#00ffcc";
        }
    });

    video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    });

    // 3. Analyse-Loop beim Abspielen des Videos triggern
    let isProcessing = false;
    async function processVideoFrame() {
        if (video.paused || video.ended) {
            isProcessing = false;
            return;
        }
        
        // Schickt das aktuelle Einzelbild an die KI
        try {
            await pose.send({ image: video });
        } catch (err) {
            console.error("Frame-Verarbeitung fehlgeschlagen:", err);
        }

        // Führt die Funktion beim nächsten Frame wieder aus
        requestAnimationFrame(processVideoFrame);
    }

    video.addEventListener('play', () => {
        statusText.innerText = "Analysiere Bewegung...";
        statusText.style.color = "#ffcc00";
        if (!isProcessing) {
            isProcessing = true;
            requestAnimationFrame(processVideoFrame);
        }
    });
</script>

</body>
</html>
