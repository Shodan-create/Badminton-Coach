<script>


/* =====================================================
   ELEMENTE
===================================================== */

const fileInput =
  document.getElementById("fileInput");

const video =
  document.getElementById("video");

const videoWrapper =
  document.getElementById("videoWrapper");

const overlay =
  document.getElementById("overlay");

const ctx =
  overlay.getContext("2d");

const controls =
  document.getElementById("controls");

const startButton =
  document.getElementById("startAnalysis");

const stopButton =
  document.getElementById("stopAnalysis");

const status =
  document.getElementById("status");

const loading =
  document.getElementById("loading");

const analysisPanel =
  document.getElementById("analysisPanel");

const playerCount =
  document.getElementById("playerCount");

const confidence =
  document.getElementById("confidence");

const framesElement =
  document.getElementById("frames");

const fpsElement =
  document.getElementById("fps");

const playerList =
  document.getElementById("playerList");


/* =====================================================
   GLOBALE VARIABLEN
===================================================== */

let detector = null;

let videoURL = null;

let analyzing = false;

let animationFrame = null;

let totalFrames = 0;

let fpsFrames = 0;

let lastFPSUpdate = performance.now();

let analysisFPS = 0;


/* =====================================================
   KONFIGURATION
===================================================== */


/*
   MultiPose Lightning kann mehrere Personen
   gleichzeitig erkennen.

   Die maximale Anzahl wird auf 4 gesetzt,
   da Badminton-Doppel normalerweise
   vier Spieler hat.
*/

const MAX_PLAYERS = 4;


/*
   Niedrigere Schwelle als vorher.

   Das hilft bei Spielern,
   die weiter entfernt stehen.
*/

const MIN_SCORE = 0.20;


/*
   Anzahl sichtbarer Gelenkpunkte,
   die mindestens vorhanden sein müssen.
*/

const MIN_VISIBLE_POINTS = 5;


/*
   Spielerfarben
*/

const PLAYER_COLORS = [

  "#00FF66",

  "#00BFFF",

  "#FFCC00",

  "#FF4D6D"

];


/* =====================================================
   SKELETT
===================================================== */

const SKELETON = [

  [0,1],
  [0,2],

  [1,3],
  [2,4],

  [0,5],
  [0,6],

  [5,6],

  [5,7],
  [7,9],

  [6,8],
  [8,10],

  [5,11],
  [6,12],

  [11,12],

  [11,13],
  [13,15],

  [12,14],
  [14,16]

];


/* =====================================================
   VIDEO AUSWÄHLEN
===================================================== */

fileInput.addEventListener(

  "change",

  function(event) {


    const file =
      event.target.files[0];


    if (!file) {

      return;

    }


    if (
      !file.type.startsWith("video/")
    ) {

      status.textContent =
        "Bitte wähle eine gültige Videodatei.";

      return;

    }


    /*
       Alte Video-URL entfernen
    */

    if (videoURL) {

      URL.revokeObjectURL(
        videoURL
      );

    }


    /*
       Neue URL
    */

    videoURL =
      URL.createObjectURL(
        file
      );


    video.src =
      videoURL;


    video.load();


    /*
       Oberfläche anzeigen
    */

    videoWrapper.style.display =
      "block";

    controls.style.display =
      "flex";

    analysisPanel.style.display =
      "block";


    status.textContent =
      "Video geladen: " +
      file.name;


    /*
       Alte Statistik zurücksetzen
    */

    resetStatistics();


    /*
       Canvas vorbereiten
    */

    video.addEventListener(

      "loadedmetadata",

      setupCanvas,

      {
        once: true
      }

    );

  }

);


/* =====================================================
   CANVAS EINRICHTEN
===================================================== */

function setupCanvas() {


  overlay.width =
    video.videoWidth;


  overlay.height =
    video.videoHeight;


  ctx.clearRect(

    0,

    0,

    overlay.width,

    overlay.height

  );


  console.log(

    "Videoauflösung:",

    video.videoWidth,

    "x",

    video.videoHeight

  );

}


/* =====================================================
   STATISTIK ZURÜCKSETZEN
===================================================== */

function resetStatistics() {


  totalFrames = 0;

  fpsFrames = 0;

  lastFPSUpdate =
    performance.now();

  playerCount.textContent =
    "0";

  confidence.textContent =
    "0%";

  framesElement.textContent =
    "0";

  fpsElement.textContent =
    "0";

  playerList.innerHTML =
    "";

}


/* =====================================================
   MODELL LADEN
===================================================== */

async function loadModel() {


  if (detector) {

    return detector;

  }


  loading.style.display =
    "block";


  status.textContent =
    "🤖 Multi-Person-Pose-Modell wird geladen...";


  try {


    /*
       WebGL aktivieren
    */

    await tf.setBackend(
      "webgl"
    );


    await tf.ready();


    console.log(

      "TensorFlow Backend:",

      tf.getBackend()

    );


    /*
       WICHTIG:

       Hier wird jetzt tatsächlich
       MULTIPOSE_LIGHTNING verwendet.

       Nicht SINGLEPOSE_THUNDER.
    */

    detector =
      await poseDetection.createDetector(

        poseDetection.SupportedModels.MoveNet,

        {

          modelType:
            poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,

          enableSmoothing:
            true,

          minPoseScore:
            0.15

        }

      );


    loading.style.display =
      "none";


    status.textContent =
      "✅ Multi-Person-KI bereit. Bis zu 4 Spieler können erkannt werden.";


    return detector;


  } catch (error) {


    console.error(

      "Modellfehler:",

      error

    );


    loading.style.display =
      "none";


    status.textContent =
      "❌ KI-Modell konnte nicht geladen werden.";


    throw error;

  }

}


/* =====================================================
   ANALYSE STARTEN
===================================================== */

startButton.addEventListener(

  "click",

  async function() {


    if (!video.src) {


      status.textContent =
        "Bitte zuerst ein Video auswählen.";


      return;

    }


    if (analyzing) {

      return;

    }


    try {


      /*
         Modell laden
      */

      await loadModel();


      /*
         Analyse starten
      */

      analyzing =
        true;


      resetStatistics();


      status.textContent =
        "🤖 KI analysiert bis zu 4 Spieler gleichzeitig...";


      /*
         Video starten
      */

      await video.play();


      /*
         Analyse Loop
      */

      detectFrame();


    } catch (error) {


      console.error(
        error
      );


      status.textContent =
        "❌ Fehler beim Starten der Analyse.";

    }

  }

);


/* =====================================================
   ANALYSE STOPPEN
===================================================== */

stopButton.addEventListener(

  "click",

  function() {


    analyzing =
      false;


    if (animationFrame) {


      cancelAnimationFrame(

        animationFrame

      );


      animationFrame =
        null;

    }


    video.pause();


    status.textContent =
      "⏹ Analyse gestoppt.";

  }

);


/* =====================================================
   FRAME ANALYSIEREN
===================================================== */

async function detectFrame() {


  if (
    !analyzing
  ) {

    return;

  }


  if (
    video.paused ||
    video.ended
  ) {

    return;

  }


  try {


    /*
       ================================================
       MULTI-POSE ERKENNUNG
       ================================================
    */

    const poses =
      await detector.estimatePoses(

        video,

        {

          maxPoses:
            MAX_PLAYERS,

          flipHorizontal:
            false

        }

      );


    /*
       ================================================
       CANVAS LÖSCHEN
       ================================================
    */

    ctx.clearRect(

      0,

      0,

      overlay.width,

      overlay.height

    );


    /*
       ================================================
       POSES FILTERN
       ================================================
    */

    const validPoses =
      poses

      .filter(

        pose => {

          if (
            !pose.keypoints
          ) {

            return false;

          }


          const visiblePoints =
            pose.keypoints.filter(

              point =>

                point.score !== undefined &&

                point.score >=
                  MIN_SCORE

            );


          return (

            visiblePoints.length >=

            MIN_VISIBLE_POINTS

          );

        }

      )

      /*
         Höchstens vier Spieler
      */

      .slice(

        0,

        MAX_PLAYERS

      );


    /*
       ================================================
       SPIELER ZEICHNEN
       ================================================
    */

    validPoses.forEach(

      (pose, index) => {


        const color =

          PLAYER_COLORS[

            index %

            PLAYER_COLORS.length

          ];


        drawPlayer(

          pose,

          index,

          color

        );

      }

    );


    /*
       ================================================
       SPIELERANZAHL
       ================================================
    */

    playerCount.textContent =

      validPoses.length;


    /*
       ================================================
       DURCHSCHNITTLICHE SICHERHEIT
       ================================================
    */

    let totalConfidence =
      0;

    let confidencePoints =
      0;


    validPoses.forEach(

      pose => {


        pose.keypoints.forEach(

          point => {


            if (

              point.score !== undefined &&

              point.score >=
                MIN_SCORE

            ) {


              totalConfidence +=

                point.score;


              confidencePoints++;

            }

          }

        );

      }

    );


    if (
      confidencePoints > 0
    ) {


      const average =

        totalConfidence /

        confidencePoints;


      confidence.textContent =

        Math.round(

          average *

          100

        ) +

        "%";


    }


    /*
       ================================================
       FRAME ZÄHLER
       ================================================
    */

    totalFrames++;

    fpsFrames++;


    framesElement.textContent =

      totalFrames;


    /*
       ================================================
       FPS
       ================================================
    */

    const now =

      performance.now();


    const elapsed =

      now -

      lastFPSUpdate;


    if (
      elapsed >= 1000
    ) {


      analysisFPS =

        Math.round(

          fpsFrames /

          (

            elapsed /

            1000

          )

        );


      fpsElement.textContent =

        analysisFPS;


      fpsFrames = 0;


      lastFPSUpdate =

        now;

    }


    /*
       ================================================
       SPIELERLISTE
       ================================================
    */

    updatePlayerList(

      validPoses

    );


  } catch (error) {


    console.error(

      "Pose Detection Fehler:",

      error

    );

  }


  /*
     ================================================
     NÄCHSTEN FRAME PLANEN
     ================================================
  */

  if (

    analyzing &&

    !video.paused &&

    !video.ended

  ) {


    animationFrame =

      requestAnimationFrame(

        detectFrame

      );

  }

}


/* =====================================================
   SPIELER ZEICHNEN
===================================================== */

function drawPlayer(

  pose,

  index,

  color

) {


  const keypoints =

    pose.keypoints;


  /*
     Sichtbare Punkte
  */

  const visible =

    keypoints.filter(

      point =>

        point.score !== undefined &&

        point.score >=
          MIN_SCORE

    );


  if (
    visible.length === 0
  ) {

    return;

  }


  /*
     ================================================
     BOUNDING BOX
     ================================================
  */

  const xs =

    visible.map(

      point =>

        point.x

    );


  const ys =

    visible.map(

      point =>

        point.y

    );


  const minX =

    Math.min(

      ...xs

    );


  const maxX =

    Math.max(

      ...xs

    );


  const minY =

    Math.min(

      ...ys

    );


  const maxY =

    Math.max(

      ...ys

    );


  const width =

    maxX -

    minX;


  const height =

    maxY -

    minY;


  /*
     ================================================
     BOX
     ================================================
  */

  ctx.strokeStyle =

    color;


  ctx.lineWidth =

    3;


  ctx.strokeRect(

    minX,

    minY,

    width,

    height

  );


  /*
     ================================================
     LABEL
     ================================================
  */

  const label =

    "Spieler " +

    (

      index +

      1

    );


  ctx.font =

    "bold 15px Arial";


  const textWidth =

    ctx.measureText(

      label

    ).width;


  ctx.fillStyle =

    color;


  ctx.fillRect(

    minX,

    Math.max(

      0,

      minY -

      28

    ),

    textWidth +

    14,

    28

  );


  ctx.fillStyle =

    "#000000";


  ctx.fillText(

    label,

    minX +

    7,

    Math.max(

      19,

      minY -

      9

    )

  );


  /*
     ================================================
     SKELETT
     ================================================
  */

  ctx.strokeStyle =

    color;


  ctx.lineWidth =

    4;


  ctx.lineCap =

    "round";


  SKELETON.forEach(

    connection => {


      const pointA =

        keypoints[

          connection[0]

        ];


      const pointB =

        keypoints[

          connection[1]

        ];


      if (

        !pointA ||

        !pointB

      ) {

        return;

      }


      if (

        pointA.score <

          MIN_SCORE ||

        pointB.score <

          MIN_SCORE

      ) {

        return;

      }


      ctx.beginPath();


      ctx.moveTo(

        pointA.x,

        pointA.y

      );


      ctx.lineTo(

        pointB.x,

        pointB.y

      );


      ctx.stroke();

    }

  );


  /*
     ================================================
     GELENKPUNKTE
     ================================================
  */

  keypoints.forEach(

    point => {


      if (

        point.score <

        MIN_SCORE

      ) {

        return;

      }


      /*
         Äußerer Punkt
      */

      ctx.beginPath();


      ctx.arc(

        point.x,

        point.y,

        5,

        0,

        Math.PI * 2

      );


      ctx.fillStyle =

        color;


      ctx.fill();


      /*
         Innerer Punkt
      */

      ctx.beginPath();


      ctx.arc(

        point.x,

        point.y,

        2,

        0,

        Math.PI * 2

      );


      ctx.fillStyle =

        "#FFFFFF";


      ctx.fill();

    }

  );

}


/* =====================================================
   SPIELERLISTE
===================================================== */

function updatePlayerList(

  poses

) {


  playerList.innerHTML =

    "";


  poses.forEach(

    (pose, index) => {


      const color =

        PLAYER_COLORS[

          index %

          PLAYER_COLORS.length

        ];


      const visible =

        pose.keypoints.filter(

          point =>

            point.score !== undefined &&

            point.score >=

              MIN_SCORE

        );


      const average =

        visible.length > 0

        ?

        visible.reduce(

          (

            sum,

            point

          ) =>

            sum +

            point.score,

          0

        ) /

        visible.length

        :

        0;


      const card =

        document.createElement(

          "div"

        );


      card.className =

        "player-card";


      card.style.borderLeftColor =

        color;


      card.innerHTML = `

        <div
          class="player-card-title"
          style="color:${color}"
        >

          Spieler ${index + 1}

        </div>


        <div class="player-card-info">

          Sichtbare Gelenkpunkte:

          ${visible.length}


          <br>


          Pose-Sicherheit:

          ${Math.round(

            average *

            100

          )}%


        </div>

      `;


      playerList.appendChild(

        card

      );

    }

  );

}


/* =====================================================
   VIDEO ENDE
===================================================== */

video.addEventListener(

  "ended",

  function() {


    analyzing =

      false;


    if (

      animationFrame

    ) {


      cancelAnimationFrame(

        animationFrame

      );


      animationFrame =

        null;

    }


    ctx.clearRect(

      0,

      0,

      overlay.width,

      overlay.height

    );


    status.textContent =

      "✅ Videoanalyse abgeschlossen.";

  }

);


/* =====================================================
   VIDEO PAUSE
===================================================== */

video.addEventListener(

  "pause",

  function() {


    if (

      analyzing &&

      !video.ended

    ) {


      status.textContent =

        "⏸ Video pausiert – Analyse wartet.";

    }

  }

);


/* =====================================================
   AUFRÄUMEN
===================================================== */

window.addEventListener(

  "beforeunload",

  function() {


    if (

      videoURL

    ) {


      URL.revokeObjectURL(

        videoURL

      );

    }

  }

);

</script>


</body>

</html>
