
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabile KI Badminton Videoanalyse</title>
    
    <!-- Die beiden sichersten Bibliotheken für KI im Browser: p5 und ml5 -->
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .controls {
            margin: 20px 0;
        }
        .status {
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.2em;
        }
        /* Das Vorschaufenster, in dem p5.js das Video und Skelett zeichnet */
        #canvas-holder {
            display: inline-block;
            margin-top: 10px;
            border: 4px solid #333;
            border-radius: 8px;
            background-color: #000;
            overflow: hidden;
        }
        video {
            display: none; /* Das rohe Video verstecken wir, p5 zeichnet es neu */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Badminton KI-Bewegungsanalyse</h1>
    <p>Lade dein Badminton-Video hoch. Die KI zeichnet dein Skelett live ins Bild.</p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="video/*">
        <p id="status" class="status">KI wird geladen... Bitte warten.</p>
    </div>

    <div id="canvas-holder"></div>
    <video id="video" controls playsinline></video>
</div>

<script>
    let video;
    let poseNet;
    let poses = [];
    const statusText = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    // p5.js startet automatisch und baut das Videofeld auf
    function setup() {
        // Erstellt das Anzeigefeld
        const canvas = createCanvas(640, 480);
        canvas.parent('canvas-holder');

        video = select('#video');
        
        // Initialisiert PoseNet (die Bewegungserkennung)
        poseNet = ml5.poseNet(video, modelReady);
        
        // Sobald die KI eine Person sieht, speichert sie die Gelenke ab
        poseNet.on('pose', function(results) {
            poses = results;
        });
    }

    function modelReady() {
        statusText.innerText = "KI startbereit! Bitte wähle jetzt ein Video aus.";
        statusText.style.color = "#00ffcc";
    }

    // Hört darauf, wenn du eine MP4 Datei hochlädst
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            video.elt.src = fileURL;
            video.elt.load();
            video.elt.play(); // Startet das Video automatisch
            statusText.innerText = "Video läuft! Analysiere Körperhaltung...";
            statusText.style.color = "#ffcc00";
        }
    });

    // p5.js zeichnet dieses Feld 60 Mal pro Sekunde komplett neu (Loop)
    function draw() {
        // Zeichnet das aktuelle Videobild auf das Canvas
        image(video, 0, 0, width, height);

        // Wenn die KI Gelenke gefunden hat, zeichnen wir das Skelett darüber
        if (poses.length > 0) {
            drawSkeleton();
        }
    }

    function drawSkeleton() {
        // Schleife durch alle erkannten Personen (normalerweise 1)
        for (let i = 0; i < poses.length; i++) {
            let pose = poses[i].pose;
            let skeleton = poses[i].skeleton;

            // 1. Alle Schlüsselpunkte (Gelenke) als Punkte einzeichnen
            for (let j = 0; j < pose.keypoints.length; j++) {
                let keypoint = pose.keypoints[j];
                // Nur zeichnen, wenn sich die KI zu mehr als 20% sicher ist
                if (keypoint.score > 0.2) {
                    fill(0, 255, 204); // Neongrün
                    noStroke();
                    ellipse(keypoint.position.x, keypoint.position.y, 12, 12);
                }
            }

            // 2. Die Gelenke mit weißen Linien (Knochen) verbinden
            for (let j = 0; j < skeleton.length; j++) {
                let partA = skeleton[j][0];
                let partB = skeleton[j][1];
                stroke(255, 255, 255); // Weiß
                strokeWeight(4);
                line(partA.position.x, partA.position.y, partB.position.x, partB.position.y);
            }
        }
    }
</script>

</body>
</html>
